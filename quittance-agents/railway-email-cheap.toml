# railway-email-cheap.toml — Quittance Email-Cheap Seller (slash demo)
#
# In Railway dashboard → service Settings → Config File Path:
#   quittance-agents/railway-email-cheap.toml
#
# Also set these env vars in Railway for this service:
#   SELLER_CHEAP_MODE=true
#   SELLER_EMAIL_NAME=email-cheap.kite
#   SELLER_EMAIL_PRIVATE_KEY=<cheap seller EOA key>

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run seller-email"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
